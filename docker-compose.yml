services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:?set GATEWAY_API_KEY}
      OPENCODE_BASE_URL: ${OPENCODE_BASE_URL:-http://host.docker.internal:4096}
      DATABASE_PATH: /data/gateway.sqlite3
      ALLOW_UNSECURED_OPENCODE: ${ALLOW_UNSECURED_OPENCODE:-true}
      REQUIRE_AUTH_ON_HEALTH: ${REQUIRE_AUTH_ON_HEALTH:-false}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
    volumes:
      - gateway-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  gateway-data:
